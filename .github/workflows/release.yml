name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm run build

      # Idempotent: if the release already exists (e.g. the maintainer
      # pre-created it with richer notes), just refresh the built assets;
      # otherwise create it with a minimal auto-note.
      - name: Create or refresh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading/refreshing assets."
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json --clobber
          else
            echo "Release $GITHUB_REF_NAME does not exist — creating with auto-note."
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME — see README for install + usage." \
              main.js manifest.json
          fi
