name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Use `install` not `ci` — vitest@4 transitively pulls esbuild 0.28
      # whose platform packages trip up `npm ci` on non-matching runners
      # (EBADPLATFORM on openharmony-arm64 on linux-x64). `install` is
      # lenient and still respects the lockfile for reproducibility.
      - run: npm install --no-audit --no-fund

      - run: npm run build

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME — see README for install + usage." \
            main.js manifest.json
